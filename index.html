<!DOCTYPE html>
<html>
  <head>
    <title>AR 3D Model LM</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .instruction {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        border-radius: 5px;
        font-family: sans-serif;
        z-index: 1000;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="instruction">
      Aponte a câmera para o marcador "Hiro"<br>
      (Modelo 3D Real carregado!)
    </div>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <!-- Carregando o modelo 3D real -->
        <a-asset-item id="logoModel" src="logo_atual.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <!-- Exibe o modelo 3D real -->
        <a-entity 
          gltf-model="#logoModel" 
          scale="1 1 1" 
          position="0 0.5 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
